<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPMS-MC Launcher</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e0e0e0;
            height: 400px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            user-select: none;
            -webkit-app-region: drag;
        }

        .header {
            padding: 24px 20px 16px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            flex-shrink: 0;
        }

        .header h1 {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
            letter-spacing: 0.5px;
        }

        .header .subtitle {
            font-size: 11px;
            color: #888;
            margin-top: 4px;
        }

        .options {
            flex: 1;
            padding: 16px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-app-region: no-drag;
        }

        /* Custom Scrollbar */
        .options::-webkit-scrollbar {
            width: 6px;
        }

        .options::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 3px;
        }

        .options::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
        }

        .options::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .option-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 16px 12px;
            background: rgba(255, 255, 255, 0.04);
            border: 2px solid transparent;
            border-radius: 12px;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            position: relative;
            z-index: 10;
            pointer-events: auto;
            -webkit-app-region: no-drag;
        }

        .option-card:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }

        .option-card.selected {
            border-color: #00d4aa;
            background: rgba(0, 212, 170, 0.08);
            box-shadow: 0 0 20px rgba(0, 212, 170, 0.3), inset 0 0 20px rgba(0, 212, 170, 0.05);
        }

        .option-card.security.selected {
            border-color: #ffa726;
            background: rgba(255, 167, 38, 0.08);
            box-shadow: 0 0 20px rgba(255, 167, 38, 0.3), inset 0 0 20px rgba(255, 167, 38, 0.05);
        }

        /* Neon indicator dot */
        .option-card.selected::after {
            content: '';
            position: absolute;
            top: 8px;
            right: 8px;
            width: 8px;
            height: 8px;
            background: #00d4aa;
            border-radius: 50%;
            box-shadow: 0 0 10px #00d4aa;
            animation: neonPulse 1.5s ease-in-out infinite;
        }

        .option-card.security.selected::after {
            background: #ffa726;
            box-shadow: 0 0 10px #ffa726;
        }

        @keyframes neonPulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(0.9); }
        }

        .option-icon {
            font-size: 28px;
            margin-bottom: 8px;
            filter: grayscale(0.3);
            transition: filter 0.2s ease;
        }

        .option-card:hover .option-icon,
        .option-card.selected .option-icon {
            filter: grayscale(0);
        }

        .option-label {
            font-size: 12px;
            font-weight: 600;
            color: #f0f0f0;
            line-height: 1.3;
        }

        .option-desc {
            font-size: 9px;
            color: #888;
            margin-top: 4px;
            line-height: 1.4;
        }

        input[type="checkbox"] {
            position: absolute;
            opacity: 0;
            width: 0;
            height: 0;
            margin: 0;
        }

        .footer {
            padding: 12px 16px 20px;
            flex-shrink: 0;
            margin-bottom: 4px;
            -webkit-app-region: no-drag;
        }

        .run-btn {
            width: 100%;
            padding: 12px 20px;
            background: linear-gradient(135deg, #00d4aa 0%, #00a884 100%);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .run-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(0, 212, 170, 0.3);
        }

        .run-btn:active {
            transform: translateY(0);
        }

        .run-btn.countdown::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            background: rgba(0, 0, 0, 0.15);
            width: 100%;
            transform-origin: left;
            animation: countdown 5s linear forwards;
        }

        @keyframes countdown {
            from { transform: scaleX(1); }
            to { transform: scaleX(0); }
        }

        .run-text {
            position: relative;
            z-index: 1;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>PPMS-MC Launcher</h1>
        <div class="subtitle">실행 전 설정을 선택하세요</div>
    </div>

    <div class="options">
        <label class="option-card selected" data-for="useGPU">
            <input type="checkbox" id="useGPU" checked>
            <span class="option-icon">⚡</span>
            <span class="option-label">하드웨어 가속</span>
            <span class="option-desc">GPU 가속으로<br>성능 향상</span>
        </label>

        <label class="option-card selected" data-for="autoRefresh">
            <input type="checkbox" id="autoRefresh" checked>
            <span class="option-icon">🔄</span>
            <span class="option-label">자동 새로고침</span>
            <span class="option-desc">10초 멈춤 시<br>자동 복구</span>
        </label>

        <label class="option-card" data-for="highPriority">
            <input type="checkbox" id="highPriority">
            <span class="option-icon">🚀</span>
            <span class="option-label">우선순위 최적화</span>
            <span class="option-desc">높은 프로세스<br>우선순위 설정</span>
        </label>

        <label class="option-card security" data-for="securityOption">
            <input type="checkbox" id="securityOption">
            <span class="option-icon">🔒</span>
            <span class="option-label">보안 강화</span>
            <span class="option-desc">화면 캡처 차단<br>(성능 소폭 저하)</span>
        </label>
    </div>

    <div class="footer">
        <button class="run-btn countdown" id="runBtn">
            <span class="run-text">RUN (5s)</span>
        </button>
    </div>

    <script>
        const runBtn = document.getElementById('runBtn');
        let countdownTimer = null;
        let remainingSeconds = 5;

        // 카드 클릭 시 선택 상태 토글
        document.querySelectorAll('.option-card').forEach(card => {
            const checkbox = card.querySelector('input[type="checkbox"]');

            card.addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();
                checkbox.checked = !checkbox.checked;
                updateCardVisualState(card, checkbox.checked);
                console.log('[Launcher] Card clicked:', card.dataset.for, checkbox.checked);
            });

            checkbox.addEventListener('change', () => {
                updateCardVisualState(card, checkbox.checked);
            });
        });

        function updateCardVisualState(card, isChecked) {
            if (isChecked) {
                card.classList.add('selected');
            } else {
                card.classList.remove('selected');
            }
        }

        function updateButtonText() {
            if (remainingSeconds > 0) {
                runBtn.querySelector('.run-text').textContent = `RUN (${remainingSeconds}s)`;
            } else {
                runBtn.querySelector('.run-text').textContent = 'RUN';
            }
        }

        function executeLaunch() {
            const settings = {
                useGPU: document.getElementById('useGPU').checked,
                autoRefresh: document.getElementById('autoRefresh').checked,
                highPriority: document.getElementById('highPriority').checked,
                securityOption: document.getElementById('securityOption').checked
            };
            window.launcherAPI.launch(settings);
        }

        countdownTimer = setInterval(() => {
            remainingSeconds--;
            updateButtonText();
            if (remainingSeconds <= 0) {
                clearInterval(countdownTimer);
                runBtn.classList.remove('countdown');
                executeLaunch();
            }
        }, 1000);

        runBtn.addEventListener('click', () => {
            clearInterval(countdownTimer);
            runBtn.classList.remove('countdown');
            runBtn.querySelector('.run-text').textContent = 'RUN';
            executeLaunch();
        });

        updateButtonText();
    </script>
</body>
</html>
